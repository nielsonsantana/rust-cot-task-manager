secret_key = "your-production-secret-key-here"
environment = "production"

[database]
url = "sqlite://db.sqlite3?mode=rwc"

[auth_backend]
type = "database"

[middlewares]
live_reload.enabled = false

[static_files]
rewrite = "query_param"
cache_timeout = "1year"

[middlewares.session]
secure = true

[middlewares.session.store]
type = "database"

[email.transport]
type = "console"