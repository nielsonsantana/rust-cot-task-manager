{% extends "base.html" %}

{% block content %}
    <div x-data="taskApp()" class="container mx-auto max-w-2xl p-6 h-full">

        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900">{{ rust_i18n::t!("app_title") }}</h1>
        </div>
        
        <template x-if="!isAuthenticated">
        <div x-show="!isAuthenticated" class="bg-white p-8 rounded-lg shadow-md mt-20">
            <h1 class="text-2xl font-bold mb-6 text-center">{{ rust_i18n::t!("login_heading") }}</h1>
            
            <div x-show="!otpSent">
                <input x-model="email" @keydown.enter="sendOtp" type="email" placeholder="{{ rust_i18n::t!("enter_email") }}" class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="sendOtp" class="w-full bg-blue-600 text-white p-3 rounded font-semibold hover:bg-blue-700">{{ rust_i18n::t!("send_access_code") }}</button>
            </div>

            <div x-show="otpSent">
                <p class="mb-4 text-sm text-gray-600">{{ rust_i18n::t!("enter_code_sent_to") }} <span x-text="email" class="font-bold"></span></p>
                <input x-mask="999999" x-model="otpCode" @keydown.enter="verifyOtp" type="text" placeholder="{{ rust_i18n::t!("code_placeholder") }}" class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="verifyOtp" class="w-full bg-green-600 text-white p-3 rounded font-semibold hover:bg-green-700">{{ rust_i18n::t!("verify_and_login") }}</button>
            </div>
        </div>
        </template>

        <template x-if="isAuthenticated">
        <div x-show="isAuthenticated" class="bg-white p-6 rounded-lg shadow-md h-full flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">{{ rust_i18n::t!("my_tasks") }}</h1>
                <div class="flex items-center space-x-4">
                    <span x-show="userEmail" x-text="userEmail" class="text-sm text-gray-600"></span>
                    <button @click="logout" class="text-sm text-red-600 hover:underline">{{ rust_i18n::t!("logout") }}</button>
                </div>
            </div>

            <div class="flex mb-6">
                <input x-model="newTaskTitle" @keydown.enter="createTask" type="text" placeholder="{{ rust_i18n::t!("what_needs_to_be_done") }}" class="flex-1 p-3 border rounded-l focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="createTask" class="bg-blue-600 text-white px-6 rounded-r font-semibold hover:bg-blue-700">{{ rust_i18n::t!("add_task") }}</button>
            </div>

            <div class="flex space-x-4 mb-4 text-sm">
                <button @click="filter = 'All'" :class="{'font-bold text-blue-600': filter === 'All'}">{{ rust_i18n::t!("filter_all") }}</button>
                <button @click="filter = 'Pending'" :class="{'font-bold text-blue-600': filter === 'Pending'}">{{ rust_i18n::t!("filter_pending") }}</button>
                <button @click="filter = 'Completed'" :class="{'font-bold text-blue-600': filter === 'Completed'}">{{ rust_i18n::t!("filter_completed") }}</button>
            </div>

            <ul class="flex-1 overflow-y-auto space-y-3">
                <template x-for="task in filteredTasks" :key="task.id">
                    <li class="flex items-center justify-between p-4 border rounded hover:bg-gray-50">
                        <div class="flex items-center space-x-3">
                            <input type="checkbox" :checked="task.status === 'Completed'" @change="updateTaskStatus(task.id, $event.target.checked ? 'Completed' : 'Pending')" class="h-5 w-5 text-blue-600">
                            <span x-text="task.title" :class="{'line-through text-gray-400': task.status === 'Completed'}"></span>
                        </div>
                        <button @click="deleteTask(task.id)" class="text-red-500 hover:text-red-700">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </li>
                </template>
            </ul>
        </div>
        </template>
    </div>
{% endblock %}
{% block extra_js %}
    <script>
        function taskApp() {
            return {
                isAuthenticated: Alpine.$persist(false),
                email: '',
                userEmail: '',
                otpSent: false,
                otpCode: '',
                tasks: [],
                newTaskTitle: '',
                filter: 'All',

                async init(){
                    if(this.isAuthenticated){
                        await this.checkSession();
                    }
                },

                async checkSession() {
                    let res = await fetch('{{ cot::reverse!(self.urls, "get_current_user")? }}');
                    if (res.ok) {
                        let data = await res.json();
                        this.userEmail = data.email;
                        await this.fetchTasks();
                    } else {
                        this.isAuthenticated = false;
                        this.userEmail = '';
                    }
                },

                async sendOtp() {
                    if (!this.email) return;
                    await fetch('{{ cot::reverse!(self.urls, "send_otp")? }}', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.email })
                    });
                    this.otpSent = true;
                },

                async verifyOtp() {
                    let res = await fetch('{{ cot::reverse!(self.urls, "verify_otp")? }}', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.email, code: this.otpCode })
                    });
                    if (res.ok) {
                        let data = await res.json();
                        this.isAuthenticated = true;
                        this.userEmail = data.username;
                        await this.fetchTasks();
                    } else {
                        let err_msg = await res.text();
                        alert(err_msg || "{{ rust_i18n::t!("invalid_code") }}");
                    }
                },

                async logout() {
                    try {
                        await fetch('{{ cot::reverse!(self.urls, "logout")? }}', { method: 'POST' });
                    } catch (e) {
                        console.error("Logout request failed:", e);
                    }
                    this.isAuthenticated = false;
                    this.otpSent = false;
                    this.email = '';
                    this.otpCode = '';
                    this.userEmail = '';
                    this.tasks = [];
                    window.location.href = "/";
                },

                async fetchTasks() {
                    let res = await fetch('{{ cot::reverse!(self.urls, "list_tasks")? }}');
                    this.tasks = await res.json();
                },

                get filteredTasks() {
                    if (this.filter === 'All') return this.tasks;
                    return this.tasks.filter(t => t.status === this.filter);
                },

                async createTask() {
                    if (!this.newTaskTitle.trim()) return;
                    await fetch('{{ cot::reverse!(self.urls, "create_task")? }}', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: this.newTaskTitle })
                    });
                    this.newTaskTitle = '';
                    await this.fetchTasks();
                },

                async updateTaskStatus(id, status) {
                    const urlTemplate = '{{ cot::reverse!(self.urls, "update_task", id="__TASK_ID__")? }}';
                    const targetUrl = urlTemplate.replace('__TASK_ID__', encodeURIComponent(id));
                    await fetch(targetUrl, {
                        method: 'PATCH', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status })
                    });
                    await this.fetchTasks();
                },

                async deleteTask(id) {
                    const urlTemplate = '{{ cot::reverse!(self.urls, "delete_task", id="__TASK_ID__")? }}';
                    const targetUrl = urlTemplate.replace('__TASK_ID__', encodeURIComponent(id));
                    await fetch(targetUrl, { method: 'DELETE' });
                    await this.fetchTasks();
                }
            }
        }
    </script>
{% endblock %}
